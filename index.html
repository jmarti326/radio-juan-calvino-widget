<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Radio Juan Calvino · Reproductor</title>
<meta name="description" content="Reproductor en vivo de Radio Juan Calvino - Iglesia Presbiteriana Reformada del Caribe (OPC)." />

<!-- ==========================================================================
     Radio Juan Calvino — custom RadioJar player widget
     Iglesia Presbiteriana Reformada del Caribe (OPC)
     Self-contained: no build step, no dependencies. Embed via <iframe>.
     Stream + metadata are configured in the CONFIG block inside <script>.
     ========================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    /* Brand palette pulled from presbiterianareformadapr.org */
    --brand-maroon: #832521;
    --brand-red:    #a72020;
    --brand-blue:   #3d90be;
    --ink:          #f6f1ec;
    --ink-dim:      rgba(246, 241, 236, 0.62);
    --ink-faint:    rgba(246, 241, 236, 0.38);
    --glass:        rgba(255, 255, 255, 0.08);
    --glass-strong: rgba(255, 255, 255, 0.14);
    --stroke:       rgba(255, 255, 255, 0.16);
    --radius:       22px;
    --shadow:       0 18px 45px rgba(0, 0, 0, 0.45);
    --font-head:    'Poppins', system-ui, sans-serif;
    --font-body:    'Montserrat', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
  }

  body {
    font-family: var(--font-body);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---- Card ------------------------------------------------------------- */
  .player {
    position: relative;
    width: 100%;
    max-width: 380px;
    padding: 22px 22px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--stroke);
    background:
      radial-gradient(120% 140% at 0% 0%, rgba(167, 32, 32, 0.55), transparent 55%),
      radial-gradient(120% 140% at 100% 0%, rgba(61, 144, 190, 0.40), transparent 55%),
      linear-gradient(160deg, #4a1513 0%, #2a0e0d 60%, #1a0908 100%);
    box-shadow: var(--shadow);
    overflow: hidden;
    isolation: isolate;
  }

  /* subtle animated glow behind the card */
  .player::before {
    content: "";
    position: absolute;
    inset: -40%;
    z-index: -1;
    background: conic-gradient(from 0deg, rgba(167,32,32,0.25), rgba(61,144,190,0.22), rgba(167,32,32,0.25));
    filter: blur(60px);
    opacity: 0;
    transition: opacity 0.8s ease;
    animation: spin 18s linear infinite;
  }
  .player.is-playing::before { opacity: 0.9; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Header ----------------------------------------------------------- */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .brand .mark {
    width: 34px; height: 34px;
    flex: 0 0 auto;
    border-radius: 9px;
    display: grid; place-items: center;
    background: rgba(255,255,255,0.10);
    border: 1px solid var(--stroke);
  }
  .brand .mark svg { width: 18px; height: 18px; display: block; }
  .brand .names { min-width: 0; }
  .brand .station {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 14px;
    line-height: 1.1;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brand .church {
    font-size: 10.5px;
    color: var(--ink-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-dim);
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--stroke);
    transition: color 0.3s, background 0.3s;
  }
  .live .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink-faint);
    transition: background 0.3s;
  }
  .player.is-playing .live { color: #fff; background: rgba(167,32,32,0.35); }
  .player.is-playing .live .dot {
    background: #ff5a4d;
    box-shadow: 0 0 0 0 rgba(255, 90, 77, 0.7);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,90,77,0.7); }
    70%  { box-shadow: 0 0 0 7px rgba(255,90,77,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,90,77,0); }
  }

  /* ---- Now playing ------------------------------------------------------ */
  .now {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .art {
    position: relative;
    width: 92px; height: 92px;
    flex: 0 0 auto;
    border-radius: 16px;
    overflow: hidden;
    background:
      linear-gradient(150deg, var(--brand-maroon), #3a100f);
    border: 1px solid var(--stroke);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .art img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .art img.loaded { opacity: 1; }
  .art .art-fallback {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.55);
  }
  .art .art-fallback svg { width: 40px; height: 40px; }
  .player.is-playing .art { animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.03); }
  }

  .meta { min-width: 0; flex: 1 1 auto; }
  .meta .eyebrow {
    font-family: var(--font-head);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.4px;
    color: var(--brand-blue);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .meta .title {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 17px;
    line-height: 1.22;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .meta .artist {
    font-size: 12.5px;
    color: var(--ink-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* animated equalizer (only visible while playing) */
  .eq {
    display: inline-flex;
    align-items: flex-end;
    gap: 3px;
    height: 14px;
    margin-top: 9px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .player.is-playing .eq { opacity: 1; }
  .eq span {
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(var(--brand-blue), #7ec2e6);
    height: 30%;
  }
  .player.is-playing .eq span { animation: bounce 1s ease-in-out infinite; }
  .eq span:nth-child(2) { animation-delay: 0.2s; }
  .eq span:nth-child(3) { animation-delay: 0.4s; }
  .eq span:nth-child(4) { animation-delay: 0.15s; }
  .eq span:nth-child(5) { animation-delay: 0.55s; }
  @keyframes bounce {
    0%,100% { height: 25%; }
    50%     { height: 100%; }
  }

  /* ---- Controls --------------------------------------------------------- */
  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 20px;
  }

  .play {
    position: relative;
    width: 58px; height: 58px;
    flex: 0 0 auto;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(145deg, var(--brand-red), var(--brand-maroon));
    box-shadow: 0 10px 24px rgba(167,32,32,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    display: grid; place-items: center;
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }
  .play:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .play:active { transform: translateY(0) scale(0.96); }
  .play:focus-visible { outline: 3px solid var(--brand-blue); outline-offset: 3px; }
  .play svg { width: 24px; height: 24px; display: block; }
  .play .ico-pause, .play .ico-load { display: none; }
  .player.is-playing  .play .ico-play  { display: none; }
  .player.is-playing  .play .ico-pause { display: block; }
  .player.is-loading  .play .ico-play,
  .player.is-loading  .play .ico-pause { display: none; }
  .player.is-loading  .play .ico-load  { display: block; animation: spin 0.9s linear infinite; }

  .vol {
    display: flex;
    align-items: center;
    gap: 9px;
    flex: 1 1 auto;
    min-width: 0;
  }
  .vol .vol-ico { color: var(--ink-dim); flex: 0 0 auto; display: grid; place-items: center; }
  .vol .vol-ico svg { width: 18px; height: 18px; display: block; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 999px;
    background: linear-gradient(to right, var(--brand-blue) var(--vol, 80%), rgba(255,255,255,0.16) var(--vol, 80%));
    cursor: pointer;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--brand-blue);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    transition: transform 0.12s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]::-moz-range-thumb {
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--brand-blue);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  .status {
    margin-top: 14px;
    min-height: 15px;
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    letter-spacing: 0.2px;
    transition: color 0.3s;
  }
  .status.error { color: #ff8f85; }

  /* Reduced motion: calm everything down */
  @media (prefers-reduced-motion: reduce) {
    .player::before,
    .player.is-playing .art,
    .eq span,
    .play .ico-load { animation: none !important; }
  }

  @media (max-width: 360px) {
    .art { width: 78px; height: 78px; }
    .meta .title { font-size: 15.5px; }
  }
</style>
</head>

<body>
  <main class="player" id="player" aria-label="Reproductor de Radio Juan Calvino">
    <div class="top">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <!-- cross / radio mark -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#f6f1ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M5 9h14"/>
          </svg>
        </span>
        <span class="names">
          <span class="station" id="stationName">Radio Juan Calvino</span>
          <span class="church">Iglesia Presbiteriana Reformada del Caribe</span>
        </span>
      </div>
      <span class="live" aria-live="off"><span class="dot"></span>EN VIVO</span>
    </div>

    <div class="now">
      <div class="art">
        <img id="artImg" alt="" />
        <span class="art-fallback" id="artFallback" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
        </span>
      </div>
      <div class="meta">
        <div class="eyebrow" id="eyebrow">Transmisión en vivo</div>
        <div class="title" id="trackTitle">Radio Juan Calvino</div>
        <div class="artist" id="trackArtist">Presiona play para escuchar</div>
        <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="controls">
      <button class="play" id="playBtn" type="button" aria-label="Reproducir">
        <svg class="ico-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="ico-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
        <svg class="ico-load"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9" opacity="0.9"/></svg>
      </button>

      <div class="vol">
        <span class="vol-ico" id="volIco" role="button" tabindex="0" aria-label="Silenciar">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
        </span>
        <input type="range" id="volume" min="0" max="100" value="80" aria-label="Volumen" />
      </div>
    </div>

    <div class="status" id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
  (function () {
    "use strict";

    /* ===================== CONFIG ===================== */
    var CONFIG = {
      // RadioJar station id (from the stream URL).
      stationId:  "usdyrun8zccwv",
      // Primary audio source. https:// lets browsers auto-upgrade the
      // RadioJar node redirect, avoiding mixed-content blocking on https sites.
      streamUrl:  "https://stream.radiojar.com/usdyrun8zccwv",
      // Now-playing metadata endpoint (CORS enabled: access-control-allow-origin: *).
      metaUrl:    "https://www.radiojar.com/api/stations/usdyrun8zccwv/now_playing/",
      // How often to refresh the "now playing" info, in ms.
      pollMs:     15000,
      // Fallback artwork when the track has no thumbnail.
      fallbackArt: "https://cpmfiles1.com/presbiterianareformadapr.org/ipr-logo-01-01.jpg",
      stationName: "Radio Juan Calvino"
    };
    /* ================================================== */

    var el = {
      player:  document.getElementById("player"),
      playBtn: document.getElementById("playBtn"),
      volume:  document.getElementById("volume"),
      volIco:  document.getElementById("volIco"),
      artImg:  document.getElementById("artImg"),
      artFb:   document.getElementById("artFallback"),
      title:   document.getElementById("trackTitle"),
      artist:  document.getElementById("trackArtist"),
      eyebrow: document.getElementById("eyebrow"),
      status:  document.getElementById("status")
    };

    var audio = new Audio();
    audio.preload = "none";
    audio.crossOrigin = "anonymous";
    audio.volume = 0.8;

    var lastTrackKey = "";
    var pollTimer = null;

    /* -------- helpers -------- */
    function setStatus(msg, isError) {
      el.status.textContent = msg || "";
      el.status.classList.toggle("error", !!isError);
    }

    function setVolFill(pct) {
      el.volume.style.setProperty("--vol", pct + "%");
    }

    function esc(s) { return (s == null ? "" : String(s)).trim(); }

    /* -------- now playing -------- */
    function applyTrack(data) {
      var title  = esc(data && data.title);
      var artist = esc(data && data.artist);
      var album  = esc(data && data.album);
      var thumb  = esc(data && data.thumb);

      var key = title + "|" + artist;
      if (key === lastTrackKey) return;     // no change
      lastTrackKey = key;

      el.title.textContent  = title || CONFIG.stationName;
      el.artist.textContent = artist || (album || "Transmisión en vivo");
      el.eyebrow.textContent = album && artist ? album : "Sonando ahora";

      loadArt(thumb || CONFIG.fallbackArt);
    }

    function loadArt(src) {
      if (!src) { showFallbackArt(); return; }
      var probe = new Image();
      probe.onload = function () {
        el.artImg.src = src;
        el.artImg.classList.add("loaded");
        el.artFb.style.display = "none";
      };
      probe.onerror = showFallbackArt;
      probe.src = src;
    }

    function showFallbackArt() {
      el.artImg.classList.remove("loaded");
      el.artImg.removeAttribute("src");
      el.artFb.style.display = "grid";
    }

    function fetchNowPlaying() {
      fetch(CONFIG.metaUrl, { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) { if (data) applyTrack(data); })
        .catch(function () { /* metadata is best-effort; ignore */ });
    }

    function startPolling() {
      fetchNowPlaying();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(fetchNowPlaying, CONFIG.pollMs);
    }

    /* -------- playback -------- */
    function play() {
      el.player.classList.add("is-loading");
      setStatus("Conectando…");
      // Re-assign src each play so we always reconnect to the live edge.
      audio.src = CONFIG.streamUrl + (CONFIG.streamUrl.indexOf("?") > -1 ? "&" : "?") + "_=" + Date.now();
      var p = audio.play();
      if (p && p.catch) {
        p.catch(function (err) {
          el.player.classList.remove("is-loading", "is-playing");
          el.playBtn.setAttribute("aria-label", "Reproducir");
          setStatus("No se pudo reproducir. Toca play de nuevo.", true);
          console.warn("play() rejected:", err);
        });
      }
    }

    function stop() {
      audio.pause();
      // Fully detach so we don't keep buffering a live stream in the background.
      audio.removeAttribute("src");
      audio.load();
      el.player.classList.remove("is-playing", "is-loading");
      el.playBtn.setAttribute("aria-label", "Reproducir");
      setStatus("");
    }

    function toggle() {
      if (el.player.classList.contains("is-playing") ||
          el.player.classList.contains("is-loading")) {
        stop();
      } else {
        play();
      }
    }

    /* -------- audio events -------- */
    audio.addEventListener("playing", function () {
      el.player.classList.remove("is-loading");
      el.player.classList.add("is-playing");
      el.playBtn.setAttribute("aria-label", "Pausar");
      setStatus("");
    });
    audio.addEventListener("waiting", function () {
      el.player.classList.add("is-loading");
      setStatus("Cargando…");
    });
    audio.addEventListener("stalled", function () { setStatus("Reconectando…"); });
    audio.addEventListener("error", function () {
      if (!audio.src) return; // ignore errors caused by our own detach
      el.player.classList.remove("is-loading", "is-playing");
      el.playBtn.setAttribute("aria-label", "Reproducir");
      setStatus("Señal no disponible. Intenta nuevamente.", true);
    });

    /* -------- volume -------- */
    var lastVol = 80;
    function applyVolume(v) {
      v = Math.max(0, Math.min(100, v));
      audio.volume = v / 100;
      audio.muted = v === 0;
      setVolFill(v);
      el.volume.value = v;
    }
    el.volume.addEventListener("input", function () {
      var v = parseInt(el.volume.value, 10) || 0;
      if (v > 0) lastVol = v;
      applyVolume(v);
    });
    function toggleMute() {
      if (audio.muted || audio.volume === 0) applyVolume(lastVol || 80);
      else { lastVol = parseInt(el.volume.value, 10) || 80; applyVolume(0); }
    }
    el.volIco.addEventListener("click", toggleMute);
    el.volIco.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleMute(); }
    });

    /* -------- wire up -------- */
    el.playBtn.addEventListener("click", toggle);
    document.addEventListener("keydown", function (e) {
      // Space toggles play when focus isn't on the slider.
      if (e.code === "Space" && document.activeElement !== el.volume) {
        e.preventDefault(); toggle();
      }
    });

    // init
    setVolFill(80);
    el.stationName = CONFIG.stationName;
    document.getElementById("stationName").textContent = CONFIG.stationName;
    startPolling();
  })();
  </script>
</body>
</html>
