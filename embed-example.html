<!DOCTYPE html>
<!--
  Example: embedding the Radio Juan Calvino widget on the church website.
  Copy the <iframe> below into any page (e.g. inside the church-info-bar).
  Replace YOUR-USERNAME / host with wherever index.html is published.
-->
<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Ejemplo de inserción</title></head>
<body style="background:#f2efe9;font-family:sans-serif;padding:40px;">

  <h3>Reproductor recomendado (responsivo)</h3>
  <iframe
    src="https://YOUR-USERNAME.github.io/radio-juan-calvino-widget/"
    title="Radio Juan Calvino"
    style="border:0;width:100%;max-width:410px;height:250px;overflow:hidden;"
    scrolling="no"
    loading="lazy"
    allow="autoplay">
  </iframe>

  <h3>Tamaño fijo (compacto)</h3>
  <iframe
    src="https://YOUR-USERNAME.github.io/radio-juan-calvino-widget/"
    title="Radio Juan Calvino"
    width="380" height="250" frameborder="0" scrolling="no" allow="autoplay">
  </iframe>

</body>
</html>
