<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radio Juan Calvino · Responsivo</title>
<meta name="description" content="Reproductor responsivo en vivo de Radio Juan Calvino - Iglesia Presbiteriana Reformada del Caribe (OPC)." />

<!-- ==========================================================================
     Radio Juan Calvino — RESPONSIVE player (fluid full-width horizontal bar)
     Scales smoothly desktop -> phone at a CONSTANT height, so a single
     width:100% iframe works at every screen size. Uses container queries
     (with a viewport-media-query fallback) to adapt to the iframe's own width.
     Self-contained: no build step, no dependencies.
     ========================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --brand-maroon: #832521;
    --brand-red:    #a72020;
    --brand-blue:   #3d90be;
    --ink:          #f6f1ec;
    --ink-dim:      rgba(246, 241, 236, 0.64);
    --ink-faint:    rgba(246, 241, 236, 0.40);
    --stroke:       rgba(255, 255, 255, 0.16);
    --font-head:    'Poppins', system-ui, sans-serif;
    --font-body:    'Montserrat', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: transparent; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(4px, 1.5vw, 12px);
    -webkit-font-smoothing: antialiased;
  }

  /* the bar is a fluid container; children read its width via container queries */
  .bar {
    container-type: inline-size;
    container-name: player;
    position: relative;
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    gap: clamp(10px, 2.2cqi, 18px);
    padding: clamp(10px, 2cqi, 15px) clamp(12px, 2.4cqi, 20px);
    border-radius: clamp(14px, 2.2cqi, 20px);
    border: 1px solid var(--stroke);
    background:
      radial-gradient(120% 220% at 0% 0%, rgba(167,32,32,0.55), transparent 55%),
      radial-gradient(120% 220% at 100% 100%, rgba(61,144,190,0.40), transparent 55%),
      linear-gradient(150deg, #4a1513 0%, #2a0e0d 62%, #1a0908 100%);
    box-shadow: 0 14px 34px rgba(0,0,0,0.42);
    overflow: hidden;
  }

  /* ---- album art ---- */
  .art {
    position: relative;
    flex: 0 0 auto;
    width: clamp(46px, 9cqi, 72px);
    height: clamp(46px, 9cqi, 72px);
    border-radius: clamp(10px, 1.6cqi, 15px);
    overflow: hidden;
    background: linear-gradient(150deg, var(--brand-maroon), #3a100f);
    border: 1px solid var(--stroke);
  }
  .art img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; }
  .art img.loaded { opacity: 1; }
  .art .art-fallback { position: absolute; inset: 0; display: grid; place-items: center; color: rgba(255,255,255,0.5); }
  .art .art-fallback svg { width: 45%; height: 45%; }
  .bar.is-playing .art { animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

  /* ---- text ---- */
  .info { min-width: 0; flex: 1 1 auto; }
  .toprow { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .station {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: clamp(12px, 1.9cqi, 14px);
    letter-spacing: 0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .live {
    display: inline-flex; align-items: center; gap: 5px;
    flex: 0 0 auto;
    padding: 3px 9px;
    border-radius: 999px;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: clamp(8px, 1.3cqi, 10px);
    letter-spacing: 0.8px;
    color: var(--ink-dim);
    background: rgba(0,0,0,0.28);
    border: 1px solid var(--stroke);
  }
  .live .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .bar.is-playing .live { color: #fff; background: rgba(167,32,32,0.42); }
  .bar.is-playing .live .dot {
    background: #ff5a4d;
    box-shadow: 0 0 0 0 rgba(255,90,77,0.7);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,90,77,0.7); }
    70%  { box-shadow: 0 0 0 7px rgba(255,90,77,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,90,77,0); }
  }
  .track {
    font-size: clamp(11px, 1.7cqi, 13.5px);
    color: var(--ink-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track b { color: var(--ink); font-weight: 600; }

  /* ---- controls ---- */
  .controls { display: flex; align-items: center; gap: clamp(8px, 1.8cqi, 14px); flex: 0 0 auto; }

  .play {
    position: relative;
    width: clamp(42px, 8cqi, 54px);
    height: clamp(42px, 8cqi, 54px);
    flex: 0 0 auto;
    border: none; border-radius: 50%;
    cursor: pointer; color: #fff;
    background: linear-gradient(145deg, var(--brand-red), var(--brand-maroon));
    box-shadow: 0 8px 18px rgba(167,32,32,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    display: grid; place-items: center;
    transition: transform 0.15s ease, filter 0.2s ease;
  }
  .play:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .play:active { transform: scale(0.95); }
  .play:focus-visible { outline: 3px solid var(--brand-blue); outline-offset: 3px; }
  .play svg { width: 44%; height: 44%; display: block; }
  .play .ico-pause, .play .ico-load { display: none; }
  .bar.is-playing .play .ico-play  { display: none; }
  .bar.is-playing .play .ico-pause { display: block; }
  .bar.is-loading .play .ico-play,
  .bar.is-loading .play .ico-pause { display: none; }
  .bar.is-loading .play .ico-load  { display: block; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .vol { display: flex; align-items: center; gap: 9px; width: clamp(90px, 16cqi, 150px); }
  .vol .vol-ico { color: var(--ink-dim); flex: 0 0 auto; display: grid; place-items: center; cursor: pointer; }
  .vol .vol-ico svg { width: 18px; height: 18px; display: block; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 5px; border-radius: 999px;
    background: linear-gradient(to right, var(--brand-blue) var(--vol, 80%), rgba(255,255,255,0.16) var(--vol, 80%));
    cursor: pointer; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 2px solid var(--brand-blue); box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 2px solid var(--brand-blue);
  }

  /* mute-only button, shown when the slider is hidden on narrow screens */
  .mute {
    display: none;
    width: 34px; height: 34px;
    border: none; background: transparent; color: var(--ink-dim);
    cursor: pointer; border-radius: 8px;
    place-items: center;
  }
  .mute:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .mute:focus-visible { outline: 2px solid var(--brand-blue); outline-offset: 1px; }
  .mute svg { width: 17px; height: 17px; display: block; }
  .mute .ico-muted { display: none; }
  .bar.is-muted .mute .ico-on { display: none; }
  .bar.is-muted .mute .ico-muted { display: block; }

  /* ---------- ADAPTIVE BREAKPOINTS (container-query based) ---------- */
  /* Narrow: hide the volume slider, show a compact mute button instead. */
  @container player (max-width: 440px) {
    .vol  { display: none; }
    .mute { display: grid; }
  }
  /* Very narrow (small phones): drop the album art to save space. */
  @container player (max-width: 320px) {
    .art { display: none; }
  }

  /* Fallback for engines without container-query support (uses iframe viewport). */
  @supports not (container-type: inline-size) {
    @media (max-width: 440px) { .vol { display: none; } .mute { display: grid; } }
    @media (max-width: 320px) { .art { display: none; } }
  }

  @media (prefers-reduced-motion: reduce) {
    .bar.is-playing .art, .live .dot, .play .ico-load { animation: none !important; }
  }
</style>
</head>

<body>
  <div class="bar" id="bar" aria-label="Reproductor de Radio Juan Calvino">
    <div class="art">
      <img id="artImg" alt="" />
      <span class="art-fallback" id="artFallback" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </span>
    </div>

    <div class="info">
      <div class="toprow">
        <span class="station" id="stationName">Radio Juan Calvino</span>
        <span class="live"><span class="dot"></span>EN VIVO</span>
      </div>
      <div class="track" id="track">Presiona play para escuchar</div>
    </div>

    <div class="controls">
      <button class="play" id="playBtn" type="button" aria-label="Reproducir">
        <svg class="ico-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="ico-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
        <svg class="ico-load"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9" opacity="0.9"/></svg>
      </button>

      <div class="vol">
        <span class="vol-ico" id="volIco" role="button" tabindex="0" aria-label="Silenciar">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
        </span>
        <input type="range" id="volume" min="0" max="100" value="80" aria-label="Volumen" />
      </div>

      <button class="mute" id="muteBtn" type="button" aria-label="Silenciar">
        <svg class="ico-on"    viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
        <svg class="ico-muted" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm18.3-2.3-1.4-1.4L17 11.2 14.1 8.3l-1.4 1.4L15.6 12.6l-2.9 2.9 1.4 1.4L17 14l2.9 2.9 1.4-1.4L18.4 12.6z"/></svg>
      </button>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    /* ===================== CONFIG ===================== */
    var CONFIG = {
      streamUrl:   "https://stream.radiojar.com/usdyrun8zccwv",
      metaUrl:     "https://www.radiojar.com/api/stations/usdyrun8zccwv/now_playing/",
      pollMs:      15000,
      fallbackArt: "https://cpmfiles1.com/presbiterianareformadapr.org/ipr-logo-01-01.jpg",
      stationName: "Radio Juan Calvino"
    };
    /* ================================================== */

    var bar     = document.getElementById("bar");
    var playBtn = document.getElementById("playBtn");
    var volume  = document.getElementById("volume");
    var volIco  = document.getElementById("volIco");
    var muteBtn = document.getElementById("muteBtn");
    var artImg  = document.getElementById("artImg");
    var artFb   = document.getElementById("artFallback");
    var trackEl = document.getElementById("track");

    var audio = new Audio();
    audio.preload = "none";
    audio.crossOrigin = "anonymous";
    audio.volume = 0.8;

    var lastKey = "";
    var pollTimer = null;

    function esc(s) { return (s == null ? "" : String(s)).trim(); }
    function setVolFill(p) { volume.style.setProperty("--vol", p + "%"); }

    function applyTrack(d) {
      var title  = esc(d && d.title);
      var artist = esc(d && d.artist);
      var thumb  = esc(d && d.thumb);
      var key = title + "|" + artist;
      if (key === lastKey) return;
      lastKey = key;
      if (title) {
        trackEl.innerHTML = "<b></b>";
        trackEl.querySelector("b").textContent = title;
        if (artist) trackEl.appendChild(document.createTextNode(" · " + artist));
      } else {
        trackEl.textContent = "Transmisión en vivo";
      }
      loadArt(thumb || CONFIG.fallbackArt);
    }

    function loadArt(src) {
      if (!src) { showFallback(); return; }
      var probe = new Image();
      probe.onload = function () {
        artImg.src = src; artImg.classList.add("loaded"); artFb.style.display = "none";
      };
      probe.onerror = showFallback;
      probe.src = src;
    }
    function showFallback() {
      artImg.classList.remove("loaded"); artImg.removeAttribute("src"); artFb.style.display = "grid";
    }

    function fetchNowPlaying() {
      fetch(CONFIG.metaUrl, { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) { if (d) applyTrack(d); })
        .catch(function () {});
    }
    function startPolling() {
      fetchNowPlaying();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(fetchNowPlaying, CONFIG.pollMs);
    }

    function play() {
      bar.classList.add("is-loading");
      audio.src = CONFIG.streamUrl + (CONFIG.streamUrl.indexOf("?") > -1 ? "&" : "?") + "_=" + Date.now();
      var p = audio.play();
      if (p && p.catch) p.catch(function () {
        bar.classList.remove("is-loading", "is-playing");
        playBtn.setAttribute("aria-label", "Reproducir");
      });
    }
    function stop() {
      audio.pause(); audio.removeAttribute("src"); audio.load();
      bar.classList.remove("is-playing", "is-loading");
      playBtn.setAttribute("aria-label", "Reproducir");
    }
    function toggle() {
      if (bar.classList.contains("is-playing") || bar.classList.contains("is-loading")) stop();
      else play();
    }

    audio.addEventListener("playing", function () {
      bar.classList.remove("is-loading");
      bar.classList.add("is-playing");
      playBtn.setAttribute("aria-label", "Pausar");
    });
    audio.addEventListener("waiting", function () { bar.classList.add("is-loading"); });
    audio.addEventListener("error", function () {
      if (!audio.src) return;
      bar.classList.remove("is-loading", "is-playing");
      playBtn.setAttribute("aria-label", "Reproducir");
    });

    var lastVol = 80;
    function applyVolume(v) {
      v = Math.max(0, Math.min(100, v));
      audio.volume = v / 100;
      audio.muted = v === 0;
      bar.classList.toggle("is-muted", audio.muted);
      setVolFill(v);
      volume.value = v;
    }
    volume.addEventListener("input", function () {
      var v = parseInt(volume.value, 10) || 0;
      if (v > 0) lastVol = v;
      applyVolume(v);
    });
    function toggleMute() {
      if (audio.muted || audio.volume === 0) applyVolume(lastVol || 80);
      else { lastVol = parseInt(volume.value, 10) || 80; applyVolume(0); }
    }
    volIco.addEventListener("click", toggleMute);
    muteBtn.addEventListener("click", toggleMute);
    volIco.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleMute(); }
    });

    playBtn.addEventListener("click", toggle);
    document.addEventListener("keydown", function (e) {
      if (e.code === "Space" && document.activeElement !== volume) { e.preventDefault(); toggle(); }
    });

    setVolFill(80);
    document.getElementById("stationName").textContent = CONFIG.stationName;
    startPolling();
  })();
  </script>
</body>
</html>
