<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Radio Juan Calvino · Bold</title>
<meta name="description" content="Reproductor en vivo de Radio Juan Calvino - Iglesia Presbiteriana Reformada del Caribe (OPC)." />

<!-- ==========================================================================
     Radio Juan Calvino — BOLD player widget (large album-art hero layout)
     Self-contained: no build step, no dependencies. Embed via <iframe>.
     ========================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />

<style>
  :root {
    --brand-maroon: #832521;
    --brand-red:    #a72020;
    --brand-blue:   #3d90be;
    --ink:          #f6f1ec;
    --ink-dim:      rgba(246, 241, 236, 0.66);
    --ink-faint:    rgba(246, 241, 236, 0.42);
    --stroke:       rgba(255, 255, 255, 0.16);
    --radius:       24px;
    --font-head:    'Poppins', system-ui, sans-serif;
    --font-body:    'Montserrat', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: transparent; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 360px;
    border-radius: var(--radius);
    border: 1px solid var(--stroke);
    overflow: hidden;
    box-shadow: 0 22px 55px rgba(0,0,0,0.5);
    background: #1a0908;
    isolation: isolate;
  }

  /* ---- HERO: big album art ---- */
  .hero {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: linear-gradient(150deg, var(--brand-maroon), #3a100f);
  }
  .hero .art-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    transform: scale(1.15);
    filter: blur(26px) saturate(1.3) brightness(0.7);
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .hero .art-bg.loaded { opacity: 1; }
  .hero .art-main {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s ease, transform 6s ease;
  }
  .hero .art-main.loaded { opacity: 1; }
  .card.is-playing .hero .art-main { transform: scale(1.06); }
  .hero .art-fallback {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.5);
  }
  .hero .art-fallback svg { width: 84px; height: 84px; }
  /* gradient scrim so overlaid text is legible */
  .hero .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,7,6,0.55) 0%, rgba(20,7,6,0) 30%, rgba(20,7,6,0.35) 62%, rgba(20,7,6,0.96) 100%);
  }

  /* top overlay: station + live */
  .hero .top {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 16px;
    z-index: 2;
  }
  .station {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.4px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .live {
    display: inline-flex; align-items: center; gap: 6px;
    flex: 0 0 auto;
    padding: 5px 11px;
    border-radius: 999px;
    font-family: var(--font-head);
    font-weight: 700; font-size: 10px; letter-spacing: 1px;
    color: var(--ink-dim);
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--stroke);
    backdrop-filter: blur(6px);
  }
  .live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); }
  .card.is-playing .live { color: #fff; background: rgba(167,32,32,0.55); }
  .card.is-playing .live .dot {
    background: #ff5a4d;
    box-shadow: 0 0 0 0 rgba(255,90,77,0.7);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,90,77,0.7); }
    70%  { box-shadow: 0 0 0 8px rgba(255,90,77,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,90,77,0); }
  }

  /* big centered play/pause over the art */
  .hero .play {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 82px; height: 82px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(145deg, var(--brand-red), var(--brand-maroon));
    box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.28);
    display: grid; place-items: center;
    z-index: 3;
    transition: transform 0.16s ease, filter 0.2s ease, box-shadow 0.2s ease;
  }
  .hero .play:hover { transform: translate(-50%, -50%) scale(1.06); filter: brightness(1.08); }
  .hero .play:active { transform: translate(-50%, -50%) scale(0.97); }
  .hero .play:focus-visible { outline: 3px solid var(--brand-blue); outline-offset: 4px; }
  .hero .play svg { width: 34px; height: 34px; display: block; }
  .hero .play .ico-pause, .hero .play .ico-load { display: none; }
  .card.is-playing .play .ico-play  { display: none; }
  .card.is-playing .play .ico-pause { display: block; }
  .card.is-loading .play .ico-play,
  .card.is-loading .play .ico-pause { display: none; }
  .card.is-loading .play .ico-load  { display: block; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* bottom overlay: track info */
  .hero .caption {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 0 18px 18px;
    z-index: 2;
  }
  .caption .eyebrow {
    font-family: var(--font-head);
    font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
    text-transform: uppercase;
    color: #9fd0ea;
    margin-bottom: 6px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
  .caption .title {
    font-family: var(--font-head);
    font-weight: 900;
    font-size: 24px;
    line-height: 1.14;
    letter-spacing: -0.2px;
    text-shadow: 0 2px 14px rgba(0,0,0,0.7);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .caption .artist {
    margin-top: 5px;
    font-size: 14px;
    color: var(--ink-dim);
    text-shadow: 0 1px 8px rgba(0,0,0,0.7);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ---- FOOTER: volume ---- */
  .footer {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 14px 18px 16px;
    background: linear-gradient(180deg, #1a0908, #150605);
  }
  .footer .vol-ico { color: var(--ink-dim); flex: 0 0 auto; display: grid; place-items: center; cursor: pointer; }
  .footer .vol-ico svg { width: 19px; height: 19px; display: block; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 5px; border-radius: 999px;
    background: linear-gradient(to right, var(--brand-blue) var(--vol, 82%), rgba(255,255,255,0.16) var(--vol, 82%));
    cursor: pointer; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%;
    background: #fff; border: 2px solid var(--brand-blue);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%;
    background: #fff; border: 2px solid var(--brand-blue);
  }

  @media (prefers-reduced-motion: reduce) {
    .hero .art-main, .live .dot, .play .ico-load { animation: none !important; transition: opacity 0.4s ease !important; }
  }
</style>
</head>

<body>
  <div class="card" id="card" aria-label="Reproductor de Radio Juan Calvino">
    <div class="hero">
      <div class="art-bg" id="artBg"></div>
      <img class="art-main" id="artImg" alt="" />
      <span class="art-fallback" id="artFallback" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </span>
      <div class="scrim"></div>

      <div class="top">
        <span class="station" id="stationName">Radio Juan Calvino</span>
        <span class="live"><span class="dot"></span>EN VIVO</span>
      </div>

      <button class="play" id="playBtn" type="button" aria-label="Reproducir">
        <svg class="ico-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="ico-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
        <svg class="ico-load"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9" opacity="0.9"/></svg>
      </button>

      <div class="caption">
        <div class="eyebrow" id="eyebrow">Transmisión en vivo</div>
        <div class="title" id="trackTitle">Radio Juan Calvino</div>
        <div class="artist" id="trackArtist">Presiona play para escuchar</div>
      </div>
    </div>

    <div class="footer">
      <span class="vol-ico" id="volIco" role="button" tabindex="0" aria-label="Silenciar">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
      </span>
      <input type="range" id="volume" min="0" max="100" value="82" aria-label="Volumen" />
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    /* ===================== CONFIG ===================== */
    var CONFIG = {
      streamUrl:   "https://stream.radiojar.com/usdyrun8zccwv",
      metaUrl:     "https://www.radiojar.com/api/stations/usdyrun8zccwv/now_playing/",
      pollMs:      15000,
      fallbackArt: "https://cpmfiles1.com/presbiterianareformadapr.org/ipr-logo-01-01.jpg",
      stationName: "Radio Juan Calvino"
    };
    /* ================================================== */

    var el = {
      card:    document.getElementById("card"),
      playBtn: document.getElementById("playBtn"),
      volume:  document.getElementById("volume"),
      volIco:  document.getElementById("volIco"),
      artImg:  document.getElementById("artImg"),
      artBg:   document.getElementById("artBg"),
      artFb:   document.getElementById("artFallback"),
      title:   document.getElementById("trackTitle"),
      artist:  document.getElementById("trackArtist"),
      eyebrow: document.getElementById("eyebrow")
    };

    var audio = new Audio();
    audio.preload = "none";
    audio.crossOrigin = "anonymous";
    audio.volume = 0.82;

    var lastKey = "";
    var pollTimer = null;

    function esc(s) { return (s == null ? "" : String(s)).trim(); }
    function setVolFill(p) { el.volume.style.setProperty("--vol", p + "%"); }

    function applyTrack(d) {
      var title  = esc(d && d.title);
      var artist = esc(d && d.artist);
      var album  = esc(d && d.album);
      var thumb  = esc(d && d.thumb);
      var key = title + "|" + artist;
      if (key === lastKey) return;
      lastKey = key;
      el.title.textContent   = title || CONFIG.stationName;
      el.artist.textContent  = artist || (album || "Transmisión en vivo");
      el.eyebrow.textContent = (album && artist) ? album : "Sonando ahora";
      loadArt(thumb || CONFIG.fallbackArt);
    }

    function loadArt(src) {
      if (!src) { showFallback(); return; }
      var probe = new Image();
      probe.onload = function () {
        el.artImg.src = src;
        el.artImg.classList.add("loaded");
        el.artBg.style.backgroundImage = "url('" + src + "')";
        el.artBg.classList.add("loaded");
        el.artFb.style.display = "none";
      };
      probe.onerror = showFallback;
      probe.src = src;
    }
    function showFallback() {
      el.artImg.classList.remove("loaded");
      el.artImg.removeAttribute("src");
      el.artBg.classList.remove("loaded");
      el.artFb.style.display = "grid";
    }

    function fetchNowPlaying() {
      fetch(CONFIG.metaUrl, { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) { if (d) applyTrack(d); })
        .catch(function () {});
    }
    function startPolling() {
      fetchNowPlaying();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(fetchNowPlaying, CONFIG.pollMs);
    }

    function play() {
      el.card.classList.add("is-loading");
      audio.src = CONFIG.streamUrl + (CONFIG.streamUrl.indexOf("?") > -1 ? "&" : "?") + "_=" + Date.now();
      var p = audio.play();
      if (p && p.catch) p.catch(function () {
        el.card.classList.remove("is-loading", "is-playing");
        el.playBtn.setAttribute("aria-label", "Reproducir");
      });
    }
    function stop() {
      audio.pause();
      audio.removeAttribute("src");
      audio.load();
      el.card.classList.remove("is-playing", "is-loading");
      el.playBtn.setAttribute("aria-label", "Reproducir");
    }
    function toggle() {
      if (el.card.classList.contains("is-playing") || el.card.classList.contains("is-loading")) stop();
      else play();
    }

    audio.addEventListener("playing", function () {
      el.card.classList.remove("is-loading");
      el.card.classList.add("is-playing");
      el.playBtn.setAttribute("aria-label", "Pausar");
    });
    audio.addEventListener("waiting", function () { el.card.classList.add("is-loading"); });
    audio.addEventListener("error", function () {
      if (!audio.src) return;
      el.card.classList.remove("is-loading", "is-playing");
      el.playBtn.setAttribute("aria-label", "Reproducir");
    });

    var lastVol = 82;
    function applyVolume(v) {
      v = Math.max(0, Math.min(100, v));
      audio.volume = v / 100;
      audio.muted = v === 0;
      setVolFill(v);
      el.volume.value = v;
    }
    el.volume.addEventListener("input", function () {
      var v = parseInt(el.volume.value, 10) || 0;
      if (v > 0) lastVol = v;
      applyVolume(v);
    });
    function toggleMute() {
      if (audio.muted || audio.volume === 0) applyVolume(lastVol || 82);
      else { lastVol = parseInt(el.volume.value, 10) || 82; applyVolume(0); }
    }
    el.volIco.addEventListener("click", toggleMute);
    el.volIco.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleMute(); }
    });

    el.playBtn.addEventListener("click", toggle);
    document.addEventListener("keydown", function (e) {
      if (e.code === "Space" && document.activeElement !== el.volume) { e.preventDefault(); toggle(); }
    });

    setVolFill(82);
    document.getElementById("stationName").textContent = CONFIG.stationName;
    startPolling();
  })();
  </script>
</body>
</html>
